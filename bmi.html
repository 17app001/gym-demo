<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI計算機</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
        form {
            background-image: url(./img/pic-2.jpg);
            color: white;
            /* background-position: center; */
        }


        .my-button {
            margin-top: 80px;
        }

        /* @media screen and (max-width:1024px) {
            form {
                width: 80%;
            }
        } */

        /* @media screen and (max-width:768px) {
            form {
                width: 100%;
            }

            input {
                width: 70%;
            }
        } */
    </style>
</head>

<body>
    <div id="container">
        <div id="title">BMI計算機</div>
        <form action="">
            <label for="name">姓名&nbsp;</label>
            <input type="text" name="name" id="name" required>
            <br>
            <label for="height">身高&nbsp;</label>
            <input type="number" step="0.1" name="height" id="height" required>
            <br>
            <label for="weight">體重&nbsp;</label>
            <input type="number" step="0.1" name="weight" id="weight" required>
            <p><button type="submit" class="my-button">計算</button></p>

        </form>
        <a href="./index.html">返回首頁</a>
    </div>
</body>

</html>
